<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sticky Ball — Endless Fall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0a14;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: manipulation;
  }
  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, #1a0f2e 0%, #0a0a14 50%, #1a0f2e 100%);
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #score {
    position: absolute;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    font-size: 56px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(255, 100, 200, 0.8), 0 4px 0 rgba(0,0,0,0.3);
    letter-spacing: -2px;
  }
  #combo {
    position: absolute;
    top: 95px; left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: 700;
    color: #ffcc44;
    opacity: 0;
    transition: opacity 0.2s;
    text-shadow: 0 0 10px rgba(255, 200, 50, 0.8);
  }
  #combo.show { opacity: 1; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10, 10, 20, 0.85);
    backdrop-filter: blur(8px);
    z-index: 20;
    pointer-events: auto;
    transition: opacity 0.3s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .title {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 12px;
    text-shadow: 0 0 30px rgba(255, 100, 200, 0.6);
    letter-spacing: -1px;
    text-align: center;
  }
  .subtitle {
    font-size: 16px;
    color: #aaa;
    margin-bottom: 30px;
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
  }
  .final-score {
    font-size: 72px;
    font-weight: 900;
    color: #ffcc44;
    margin: 20px 0;
    text-shadow: 0 0 30px rgba(255, 200, 50, 0.6);
  }
  .best-score {
    font-size: 16px;
    color: #888;
    margin-bottom: 30px;
  }
  .btn {
    background: linear-gradient(135deg, #ff4488, #ff6644);
    color: white;
    border: none;
    padding: 18px 48px;
    font-size: 20px;
    font-weight: 800;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 68, 136, 0.4);
    transition: transform 0.1s;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: scale(0.95); }
  .sound-toggle {
    position: absolute;
    top: 30px; right: 20px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    pointer-events: auto;
    z-index: 15;
  }
  .hint {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }
  .hint.hidden { display: none; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="score">0</div>
    <div id="combo">COMBO x1</div>
    <div class="hint" id="hint">TAP TO SWITCH SIDES</div>
  </div>
  <button class="sound-toggle" id="soundBtn">🔊</button>
  <div id="overlay">
    <div class="title">STICKY BALL</div>
    <div class="subtitle">Tap to zigzag between the walls.<br>Stay stuck. Avoid the gaps. Survive.</div>
    <button class="btn" id="startBtn">TAP TO START</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const soundBtn = document.getElementById('soundBtn');
  const hintEl = document.getElementById('hint');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ===== AUDIO =====
  let audioCtx = null;
  let soundOn = true;
  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { soundOn = false; }
    }
    return audioCtx;
  }
  function beep(freq, dur, type='sine', vol=0.15, slide=0) {
    if (!soundOn) return;
    const ac = getAudio(); if (!ac) return;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq+slide), ac.currentTime + dur);
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + dur);
  }
  function sfxStick(combo) {
    const base = 400 + Math.min(combo, 20) * 30;
    beep(base, 0.08, 'square', 0.12, 200);
    beep(base * 1.5, 0.06, 'sine', 0.08, 100);
  }
  function sfxPerfect() {
    beep(800, 0.05, 'square', 0.1, 400);
    setTimeout(() => beep(1200, 0.08, 'sine', 0.08, 200), 30);
  }
  function sfxDeath() {
    beep(200, 0.3, 'sawtooth', 0.2, -150);
    setTimeout(() => beep(100, 0.4, 'sawtooth', 0.15, -80), 100);
  }
  function sfxTap() {
    beep(600, 0.04, 'sine', 0.06);
  }

  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
  });

  // ===== GAME STATE =====
  const STATE = { MENU: 0, PLAY: 1, DEAD: 2 };
  let state = STATE.MENU;

  // Ball
  const ball = {
    x: 0, y: 0,
    vx: 0, vy: 0,
    radius: 22,
    side: 'left',           // which wall it's stuck to
    stuck: true,
    squishX: 1, squishY: 1, // scale for squish/stretch
    trail: [],
    flightT: 0,             // progress through arc 0..1
    flightDuration: 0.35,
    fromX: 0, toX: 0, baseY: 0,
    color: '#ff4488'
  };

  // Walls — vertical strips on left/right. We model them as a list of segments scrolling down.
  // Each segment is either solid (stickable) or a gap (deadly).
  const walls = { left: [], right: [] };
  const WALL_WIDTH = 28;
  let scrollSpeed = 180; // pixels per second downward (world scrolls down -> walls scroll down visually)
  let baseScrollSpeed = 180;
  let timeAlive = 0;

  // Score / feedback
  let score = 0;
  let best = parseInt(localStorage.getItem('stickyBallBest') || '0', 10);
  let combo = 1;
  let shake = 0;
  const particles = [];
  const floatTexts = [];

  // ===== WALL GENERATION =====
  // We generate segments ahead of where the ball will land.
  // Each segment has: y (top in world space), height, type ('solid' | 'gap'), side
  // World coordinate: y increases downward. The ball's world y is fixed; the walls move (we shift their y up as time passes).
  // Easier: store segments with absolute screenY which decreases over time... actually let's store y as screen position and shift each frame.

  function makeSegment(side, y, height, type) {
    return { side, y, height, type };
  }

  function initWalls() {
    walls.left = [];
    walls.right = [];
    // Start with a long solid stretch on both sides
    let y = -200;
    while (y < H + 400) {
      const h = 300 + Math.random() * 200;
      walls.left.push(makeSegment('left', y, h, 'solid'));
      walls.right.push(makeSegment('right', y, h, 'solid'));
      y += h;
    }
  }

  function extendWalls() {
    // Difficulty params based on score
    const diff = Math.min(score / 50, 1); // 0..1 over first 50 points
    const gapChance = 0.15 + diff * 0.35; // up to 50%
    const minSolid = Math.max(180 - diff * 80, 90); // shorter solid as you go
    const maxSolid = Math.max(360 - diff * 150, 160);
    const minGap = 90;
    const maxGap = 140 + diff * 60;

    for (const side of ['left', 'right']) {
      const arr = walls[side];
      let last = arr[arr.length - 1];
      while (last && last.y + last.height < H + 600) {
        const newY = last.y + last.height;
        const isGap = last.type === 'solid' && Math.random() < gapChance;
        if (isGap) {
          const h = minGap + Math.random() * (maxGap - minGap);
          arr.push(makeSegment(side, newY, h, 'gap'));
        } else {
          const h = minSolid + Math.random() * (maxSolid - minSolid);
          arr.push(makeSegment(side, newY, h, 'solid'));
        }
        last = arr[arr.length - 1];
      }
    }
  }

  function pruneWalls() {
    for (const side of ['left', 'right']) {
      walls[side] = walls[side].filter(s => s.y + s.height > -50);
    }
  }

  // ===== GAME LIFECYCLE =====
  function resetGame() {
    score = 0;
    combo = 1;
    timeAlive = 0;
    scrollSpeed = baseScrollSpeed;
    shake = 0;
    particles.length = 0;
    floatTexts.length = 0;
    ball.side = 'left';
    ball.stuck = true;
    ball.x = WALL_WIDTH + ball.radius;
    ball.baseY = H * 0.45;
    ball.y = ball.baseY;
    ball.squishX = 1; ball.squishY = 1;
    ball.trail = [];
    ball.flightT = 0;
    initWalls();
    scoreEl.textContent = '0';
    comboEl.classList.remove('show');
  }

  function startGame() {
    getAudio(); // unlock audio on first tap
    resetGame();
    state = STATE.PLAY;
    overlay.classList.add('hidden');
    hintEl.classList.remove('hidden');
    setTimeout(() => hintEl.classList.add('hidden'), 2500);
  }

  function gameOver() {
    state = STATE.DEAD;
    sfxDeath();
    shake = 28;
    if (score > best) {
      best = score;
      localStorage.setItem('stickyBallBest', best.toString());
    }
    // Explosion particles
    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 100 + Math.random() * 300;
      particles.push({
        x: ball.x, y: ball.y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 1, maxLife: 0.8 + Math.random() * 0.4,
        r: 3 + Math.random() * 4,
        color: '#ff4488'
      });
    }
    setTimeout(() => {
      overlay.innerHTML = `
        <div class="title">GAME OVER</div>
        <div class="final-score">${score}</div>
        <div class="best-score">Best: ${best}</div>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
      `;
      overlay.classList.remove('hidden');
      document.getElementById('restartBtn').addEventListener('click', startGame);
    }, 800);
  }

  // ===== INPUT =====
  function handleTap() {
    if (state === STATE.MENU) { startGame(); return; }
    if (state !== STATE.PLAY) return;
    if (!ball.stuck) return; // only switch while stuck

    sfxTap();
    ball.stuck = false;
    ball.flightT = 0;
    ball.fromX = ball.x;
    ball.baseY = ball.y;
    ball.toX = (ball.side === 'left')
      ? W - WALL_WIDTH - ball.radius
      : WALL_WIDTH + ball.radius;
    ball.side = (ball.side === 'left') ? 'right' : 'left';
  }

  document.getElementById('game-container').addEventListener('pointerdown', (e) => {
    // ignore taps on UI buttons
    if (e.target.tagName === 'BUTTON') return;
    handleTap();
  });
  startBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });

  // ===== UPDATE =====
  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min((now - lastT) / 1000, 1/30);
    lastT = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt) {
    // Always update particles & shake so death animation plays
    shake *= Math.pow(0.001, dt);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt / p.maxLife;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 600 * dt;
      p.vx *= 0.98;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floatTexts.length - 1; i >= 0; i--) {
      const f = floatTexts[i];
      f.life -= dt;
      f.y -= 40 * dt;
      if (f.life <= 0) floatTexts.splice(i, 1);
    }

    if (state !== STATE.PLAY) return;

    timeAlive += dt;
    // Difficulty: scroll speed grows with score and time
    scrollSpeed = baseScrollSpeed + score * 6 + timeAlive * 4;
    scrollSpeed = Math.min(scrollSpeed, 700);

    // Squish recovery
    ball.squishX += (1 - ball.squishX) * Math.min(1, dt * 14);
    ball.squishY += (1 - ball.squishY) * Math.min(1, dt * 14);

    // Scroll walls upward (so they appear to fall — wait, walls fall DOWN means segments move DOWN on screen)
    // Actually the spec says "lines on each side which are continuously falling" — segments move downward.
    // But if walls fall down and the ball stays on them, the ball would fall with them. The game loop:
    //   The ball's y stays roughly centered. Walls scroll UP past it (which feels like the ball is falling DOWN the wall, i.e. the world falling).
    // The user perceives "falling" — same visual as Doodle Jump style.
    // To match "lines falling": we'll scroll walls DOWN past the ball (the ball climbs visually).
    // Better game feel: scroll walls UP — ball appears to fall. Let's do that (standard endless faller).
    for (const side of ['left', 'right']) {
      for (const seg of walls[side]) {
        seg.y -= scrollSpeed * dt;
      }
    }
    pruneWalls();
    extendWalls();

    // Ball flight
    if (!ball.stuck) {
      ball.flightT += dt / ball.flightDuration;
      if (ball.flightT >= 1) {
        ball.flightT = 1;
        ball.x = ball.toX;
        ball.stuck = true;
        // Squish on land
        ball.squishX = 1.5;
        ball.squishY = 0.6;
        // Check landing
        checkLanding();
      } else {
        // Zigzag arc: x interpolates linearly, y dips like a parabola
        const t = ball.flightT;
        ball.x = ball.fromX + (ball.toX - ball.fromX) * t;
        // Arc — goes UP a bit in the middle (negative y) for that zigzag feel
        const arcHeight = 60;
        ball.y = ball.baseY - Math.sin(t * Math.PI) * arcHeight;
      }
    } else {
      // Stuck: y stays where it is in screen space, but the ball is "on" the wall.
      // Check if a gap has scrolled into the ball's position -> death
      const seg = segmentAtBallY(ball.side, ball.y);
      if (!seg || seg.type === 'gap') {
        gameOver();
        return;
      }
    }

    // Trail
    ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
    if (ball.trail.length > 14) ball.trail.shift();
    for (const t of ball.trail) t.life -= dt * 3;
  }

  function segmentAtBallY(side, y) {
    const arr = walls[side];
    for (const s of arr) {
      if (y >= s.y && y <= s.y + s.height) return s;
    }
    return null;
  }

  function checkLanding() {
    const seg = segmentAtBallY(ball.side, ball.y);
    if (!seg || seg.type === 'gap') {
      gameOver();
      return;
    }
    // Score
    score++;
    scoreEl.textContent = score;

    // Perfect landing if near center of solid segment
    const segCenter = seg.y + seg.height / 2;
    const distFromCenter = Math.abs(ball.y - segCenter);
    const perfect = distFromCenter < seg.height * 0.25 && seg.height < 250;

    if (perfect) {
      combo = Math.min(combo + 1, 99);
      score += 2;
      scoreEl.textContent = score;
      shake = Math.max(shake, 10);
      sfxPerfect();
      comboEl.textContent = `PERFECT! x${combo}`;
      comboEl.classList.add('show');
      clearTimeout(comboEl._t);
      comboEl._t = setTimeout(() => comboEl.classList.remove('show'), 800);
      floatTexts.push({ x: ball.x, y: ball.y - 30, text: '+3 PERFECT', color: '#ffcc44', life: 0.8, maxLife: 0.8 });
      // Sparkle particles
      for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 160;
        particles.push({
          x: ball.x, y: ball.y,
          vx: Math.cos(a) * s, vy: Math.sin(a) * s,
          life: 1, maxLife: 0.5 + Math.random() * 0.3,
          r: 2 + Math.random() * 3,
          color: '#ffcc44'
        });
      }
    } else {
      combo = 1;
      shake = Math.max(shake, 4);
      sfxStick(combo);
      // Landing dust
      for (let i = 0; i < 6; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 40 + Math.random() * 80;
        particles.push({
          x: ball.x, y: ball.y,
          vx: Math.cos(a) * s, vy: Math.sin(a) * s,
          life: 1, maxLife: 0.3 + Math.random() * 0.2,
          r: 1 + Math.random() * 2,
          color: '#aaaaff'
        });
      }
    }
  }

  // ===== RENDER =====
  function render() {
    // Shake offset
    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.clearRect(-50, -50, W + 100, H + 100);

    // Background subtle moving stars
    drawStars();

    // Walls
    drawWalls();

    // Trail
    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      if (t.life <= 0) continue;
      ctx.globalAlpha = t.life * 0.4;
      ctx.fillStyle = '#ff66aa';
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.radius * t.life * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Ball
    drawBall();

    // Particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Float texts
    for (const f of floatTexts) {
      ctx.globalAlpha = Math.max(0, f.life / f.maxLife);
      ctx.fillStyle = f.color;
      ctx.font = 'bold 22px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  // background stars
  const stars = [];
  for (let i = 0; i < 40; i++) {
    stars.push({ x: Math.random(), y: Math.random(), s: Math.random() * 1.5 + 0.3 });
  }
  function drawStars() {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (const s of stars) {
      const y = ((s.y + (timeAlive * 0.02)) % 1) * H;
      ctx.beginPath();
      ctx.arc(s.x * W, y, s.s, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawWalls() {
    for (const side of ['left', 'right']) {
      const x = side === 'left' ? 0 : W - WALL_WIDTH;
      for (const seg of walls[side]) {
        if (seg.y > H || seg.y + seg.height < 0) continue;
        if (seg.type === 'solid') {
          // Gradient solid wall
          const g = ctx.createLinearGradient(x, 0, x + WALL_WIDTH, 0);
          if (side === 'left') {
            g.addColorStop(0, '#6644aa');
            g.addColorStop(1, '#aa66dd');
          } else {
            g.addColorStop(0, '#aa66dd');
            g.addColorStop(1, '#6644aa');
          }
          ctx.fillStyle = g;
          ctx.fillRect(x, seg.y, WALL_WIDTH, seg.height);
          // Highlight stripe
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.fillRect(x + (side === 'left' ? WALL_WIDTH - 4 : 0), seg.y, 4, seg.height);
        } else {
          // Gap — draw danger markers (small spikes)
          ctx.fillStyle = 'rgba(255, 60, 80, 0.15)';
          ctx.fillRect(x, seg.y, WALL_WIDTH, seg.height);
          ctx.strokeStyle = '#ff4466';
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 6]);
          ctx.beginPath();
          ctx.moveTo(x + WALL_WIDTH / 2, seg.y);
          ctx.lineTo(x + WALL_WIDTH / 2, seg.y + seg.height);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
    }
  }

  function drawBall() {
    ctx.save();
    ctx.translate(ball.x, ball.y);
    // Squish: stretch direction depends on which side
    let sx = ball.squishX, sy = ball.squishY;
    // If we squished on land, the squish should align with impact direction (horizontal impact -> wide x)
    ctx.scale(sx, sy);

    // Glow
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, ball.radius * 2);
    grad.addColorStop(0, '#ff88bb');
    grad.addColorStop(0.6, '#ff4488');
    grad.addColorStop(1, 'rgba(255,68,136,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, ball.radius * 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Solid ball
    ctx.fillStyle = '#ff4488';
    ctx.beginPath();
    ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(-ball.radius * 0.35, -ball.radius * 0.35, ball.radius * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
